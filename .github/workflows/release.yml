name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version; defaults to config.json"
        required: false
        type: string
      dry_run:
        description: "Build and pack without publishing"
        type: boolean
        default: true

permissions:
  actions: write
  contents: write

concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: sccache
  SCCACHE_BUCKET: ${{ secrets.SCCACHE_R2_BUCKET }}
  SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
  SCCACHE_REGION: auto
  SCCACHE_S3_USE_SSL: "true"
  SCCACHE_S3_KEY_PREFIX: raster/
  AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      npm_tag: ${{ steps.prepare.outputs.npm_tag }}
      dry_run: ${{ steps.prepare.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v5

      - id: prepare
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          config_version="$(node -e "console.log(JSON.parse(require('fs').readFileSync('config.json', 'utf8')).version)")"
          version="${INPUT_VERSION:-$config_version}"
          if [[ "${version}" != "${config_version}" ]]; then
            echo "Requested version ${version} does not match config.json version ${config_version}" >&2
            exit 1
          fi

          npm_tag="latest"
          if [[ "${version}" == *alpha* ]]; then
            npm_tag="alpha"
          fi

          dry_run="${INPUT_DRY_RUN:-true}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${npm_tag}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"

      - name: Cancel workflow on failure
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}" || true

  build-ios-release:
    name: Build and stage iOS Swift Package artifact
    needs: prepare
    runs-on: macos-26
    outputs:
      release_sha: ${{ steps.release-sha.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - uses: pnpm/action-setup@v6
        with:
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: mozilla-actions/sccache-action@v0.0.10

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: ios-xcframework
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reset sccache stats
        run: sccache --zero-stats

      - name: Build iOS XCFramework
        run: node scripts/build.mjs --platform ios-xcframework

      - name: Verify generated checksum
        shell: bash
        run: |
          set -euo pipefail
          expected="$(node -e 'const source = require("fs").readFileSync("Package.swift", "utf8"); const match = source.match(/checksum: "([0-9a-f]{64})"/); if (!match) process.exit(1); console.log(match[1]);')"
          actual="$(cat packages/raster-ios/dist/RasterRuntime.xcframework.checksum)"
          if [[ "${expected}" != "${actual}" ]]; then
            echo "Package.swift checksum ${expected} does not match generated checksum ${actual}" >&2
            exit 1
          fi

      - name: Commit Package.swift checksum
        if: needs.prepare.outputs.dry_run != 'true'
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          if git diff --cached --quiet; then
            echo "Package.swift already contains the generated checksum."
          else
            git commit -m "release: prepare iOS artifact for ${VERSION}"
          fi
          git push origin HEAD:main

      - name: Create or update GitHub Release asset
        if: needs.prepare.outputs.dry_run != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" \
              packages/raster-ios/dist/RasterRuntime.xcframework.zip \
              packages/raster-ios/dist/RasterRuntime.xcframework.checksum \
              --clobber
            gh release edit "${tag}" --title "${tag}" --notes "Raster ${VERSION}"
          else
            gh release create "${tag}" \
              packages/raster-ios/dist/RasterRuntime.xcframework.zip \
              packages/raster-ios/dist/RasterRuntime.xcframework.checksum \
              --target "$(git rev-parse HEAD)" \
              --title "${tag}" \
              --notes "Raster ${VERSION}"
          fi

      - name: Move release tag to checksum commit
        if: needs.prepare.outputs.dry_run != 'true'
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          git tag -f "${tag}" HEAD
          git push origin -f "${tag}"

      - name: Export release commit
        id: release-sha
        shell: bash
        run: echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Cancel workflow on failure
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}" || true

  build-bin:
    name: Build ${{ matrix.platform }}
    needs:
      - prepare
      - build-ios-release
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-26
            rust_target: aarch64-apple-darwin
            package_dir: packages/raster-bin-darwin-arm64
          - platform: darwin-x64
            runner: macos-26-intel
            rust_target: x86_64-apple-darwin
            package_dir: packages/raster-bin-darwin-x64
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            package_dir: packages/raster-bin-linux-arm64
          - platform: linux-x64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            package_dir: packages/raster-bin-linux-x64
          - platform: win32-x64
            runner: windows-2025
            rust_target: x86_64-pc-windows-msvc
            package_dir: packages/raster-bin-win32-x64
          - platform: win32-arm64
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            package_dir: packages/raster-bin-win32-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-ios-release.outputs.release_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - uses: pnpm/action-setup@v6
        with:
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: mozilla-actions/sccache-action@v0.0.10

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: ${{ matrix.platform }}
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Install Linux native dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            lld \
            ninja-build \
            pkg-config \
            libfontconfig1-dev \
            libfreetype6-dev \
            libssl-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clear macOS cargo env on Windows
        if: startsWith(matrix.runner, 'windows')
        shell: pwsh
        run: |
          "SDKROOT=" >> $env:GITHUB_ENV
          "BINDGEN_EXTRA_CLANG_ARGS=" >> $env:GITHUB_ENV

      - name: Reset sccache stats
        run: sccache --zero-stats

      - name: Build native binary
        run: node scripts/build.mjs --platform ${{ matrix.platform }}

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Upload binary package artifact
        uses: actions/upload-artifact@v7
        with:
          name: raster-bin-${{ matrix.platform }}
          path: ${{ matrix.package_dir }}
          if-no-files-found: error

      - name: Cancel workflow on failure
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}" || true

  build-android:
    name: Build Android Maven bundle
    needs:
      - prepare
      - build-ios-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-ios-release.outputs.release_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - uses: pnpm/action-setup@v6
        with:
          cache: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;28.2.13676358" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/28.2.13676358" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - uses: mozilla-actions/sccache-action@v0.0.10

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: android-arm64
          cache-on-failure: true
          cache-workspace-crates: true

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 9.1.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Reset sccache stats
        run: sccache --zero-stats

      - name: Build Android runtime
        run: node scripts/build.mjs --platform android-arm64

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Pack Maven Central bundle
        run: pnpm pack:android:maven
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Upload Maven bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: raster-android-maven-central-bundle
          path: packages/raster-android/build/raster-android-maven-central-bundle.zip
          if-no-files-found: error

      - name: Cancel workflow on failure
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}" || true

  verify-ios-release-asset:
    name: Verify iOS Swift Package release asset
    needs:
      - prepare
      - build-ios-release
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-ios-release.outputs.release_sha }}

      - name: Skip iOS release asset check for dry run
        if: needs.prepare.outputs.dry_run == 'true'
        run: echo "Dry run does not require an existing GitHub Release iOS artifact."

      - name: Download iOS release asset
        if: needs.prepare.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          mkdir -p packages/raster-ios/dist
          rm -f packages/raster-ios/dist/RasterRuntime.xcframework.zip
          rm -f packages/raster-ios/dist/RasterRuntime.xcframework.checksum
          for attempt in {1..30}; do
            if gh release download "${tag}" \
              --pattern RasterRuntime.xcframework.zip \
              --pattern RasterRuntime.xcframework.checksum \
              --dir packages/raster-ios/dist \
              --clobber; then
              exit 0
            fi
            echo "iOS release asset is not available yet; retry ${attempt}/30."
            sleep 10
          done
          echo "Failed to download iOS release asset for ${tag}" >&2
          exit 1

      - name: Verify iOS release asset checksum
        if: needs.prepare.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -s packages/raster-ios/dist/RasterRuntime.xcframework.zip
          expected="$(node -e 'const source = require("fs").readFileSync("Package.swift", "utf8"); const match = source.match(/checksum: "([0-9a-f]{64})"/); if (!match) process.exit(1); console.log(match[1]);')"
          actual="$(swift package compute-checksum packages/raster-ios/dist/RasterRuntime.xcframework.zip)"
          if [[ "${expected}" != "${actual}" ]]; then
            echo "Package.swift checksum ${expected} does not match release asset checksum ${actual}" >&2
            exit 1
          fi
          if [[ -s packages/raster-ios/dist/RasterRuntime.xcframework.checksum ]]; then
            recorded="$(cat packages/raster-ios/dist/RasterRuntime.xcframework.checksum)"
            if [[ "${recorded}" != "${actual}" ]]; then
              echo "Recorded checksum ${recorded} does not match release asset checksum ${actual}" >&2
              exit 1
            fi
          fi

      - name: Cancel workflow on failure
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}" || true

  publish-bin:
    name: Publish binary npm packages
    needs:
      - prepare
      - build-ios-release
      - build-bin
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-ios-release.outputs.release_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          name: raster-bin-darwin-arm64
          path: packages/raster-bin-darwin-arm64
      - uses: actions/download-artifact@v8
        with:
          name: raster-bin-darwin-x64
          path: packages/raster-bin-darwin-x64
      - uses: actions/download-artifact@v8
        with:
          name: raster-bin-linux-arm64
          path: packages/raster-bin-linux-arm64
      - uses: actions/download-artifact@v8
        with:
          name: raster-bin-linux-x64
          path: packages/raster-bin-linux-x64
      - uses: actions/download-artifact@v8
        with:
          name: raster-bin-win32-x64
          path: packages/raster-bin-win32-x64

      - name: Restore executable permissions
        run: chmod +x packages/raster-bin-*/bin/raster

      - name: Pack binary npm packages
        if: needs.prepare.outputs.dry_run == 'true'
        run: node scripts/release.mjs bin --dry-run

      - name: Publish binary npm packages
        if: needs.prepare.outputs.dry_run != 'true'
        run: node scripts/release.mjs bin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Cancel workflow on failure
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}" || true

  publish-android:
    name: Publish Android Maven package
    needs:
      - prepare
      - build-ios-release
      - build-android
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-ios-release.outputs.release_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - uses: actions/download-artifact@v8
        with:
          name: raster-android-maven-central-bundle
          path: packages/raster-android/build

      - name: Verify Maven bundle
        if: needs.prepare.outputs.dry_run == 'true'
        run: test -s packages/raster-android/build/raster-android-maven-central-bundle.zip

      - name: Publish Maven bundle
        if: needs.prepare.outputs.dry_run != 'true'
        run: node scripts/publish-maven-central.mjs --name raster-android-${{ needs.prepare.outputs.version }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Cancel workflow on failure
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}" || true

  publish-github-release:
    name: Publish GitHub Release metadata
    needs:
      - prepare
      - build-ios-release
      - verify-ios-release-asset
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-ios-release.outputs.release_sha }}

      - name: Verify dry run
        if: needs.prepare.outputs.dry_run == 'true'
        run: echo "Dry run verified release package metadata."

      - name: Update GitHub Release metadata
        if: needs.prepare.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          gh release view "${tag}" >/dev/null
          gh release edit "${tag}" --title "${tag}" --notes "Raster ${VERSION}"

      - name: Cancel workflow on failure
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}" || true

  publish-js:
    name: Publish JS npm packages
    needs:
      - prepare
      - build-ios-release
      - publish-bin
      - publish-android
      - publish-github-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-ios-release.outputs.release_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack JS npm packages
        if: needs.prepare.outputs.dry_run == 'true'
        run: node scripts/release.mjs js --dry-run

      - name: Publish JS npm packages
        if: needs.prepare.outputs.dry_run != 'true'
        run: node scripts/release.mjs js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Cancel workflow on failure
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}" || true
