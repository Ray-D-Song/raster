name: raster_runtime Release
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      fail-fast: ${{ startsWith(github.ref, 'refs/tags/') }}
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x86_64
            release: x64
            toolchain: nightly-x86_64-pc-windows-gnu
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            release: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
            release: arm64
          - os: macos-latest
            platform: darwin
            arch: x86_64
            release: x64
          - os: macos-latest
            platform: darwin
            arch: aarch64
            release: arm64

    uses: ./.github/workflows/build.yml
    with:
      os: ${{ matrix.os }}
      platform: ${{ matrix.platform }}
      arch: ${{ matrix.arch }}
      release: ${{ matrix.release }}
      toolchain: ${{ matrix.toolchain }}
  release:
    permissions:
      contents: write
      discussions: write
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Fix permissions
        run: |
          chmod 755 ./raster_runtime-container-x64*
          chmod 755 ./raster_runtime-container-arm64*
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ./CHANGELOG.md
          preserve_order: true
          prerelease: contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc')
          files: |
            ./raster_runtime-container-x64
            ./raster_runtime-container-arm64
            ./raster_runtime-linux-x64.zip
            ./raster_runtime-linux-arm64.zip
            ./raster_runtime-darwin-x64.zip
            ./raster_runtime-darwin-arm64.zip
            ./raster_runtime-windows-x64.zip
