[package]
name = "raster_runtime_os"
description = "raster_runtime Module OS"
version = "0.8.1-beta"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/ray-d-song/raster_runtime"
readme = "README.md"

[features]
default = ["network", "statistics", "system"]

network = ["sysinfo/network", "system"]
statistics = ["system"]
system = ["sysinfo/system"]

[dependencies]
home = { version = "0.5", default-features = false }
raster_runtime_utils = { version = "0.8.1-beta", path = "../../libs/raster_runtime_utils", default-features = false }
num_cpus = { version = "1", default-features = false }
once_cell = { version = "1", features = ["std"], default-features = false }
rquickjs = { version = "0.11", git = "https://github.com/DelSkayn/rquickjs", features = ["std"], default-features = false }

# Optional
sysinfo = { version = "0.39", default-features = false, optional = true }

[target.'cfg(all(unix, not(target_os = "ios")))'.dependencies]
libc = { version = "0.2", default-features = false }
users = { version = "0.11", features = ["cache"], default-features = false }

[target.'cfg(target_os = "ios")'.dependencies]
libc = { version = "0.2", default-features = false }

[target.'cfg(windows)'.dependencies]
whoami = { version = "2", default-features = false }
windows-registry = { version = "0.6", features = [
  "std",
], default-features = false }
windows-result = { version = "0.4", features = [
  "std",
], default-features = false }
windows-version = { version = "0.1", default-features = false }

[dev-dependencies]
raster_runtime_test = { path = "../../libs/raster_runtime_test" }
tokio = { version = "1", features = ["test-util"], default-features = false }
