[package]
name = "raster_runtime_timers"
description = "raster_runtime Module timers"
version = "0.8.1-beta"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/ray-d-song/raster_runtime"

[lib]
name = "raster_runtime_timers"
path = "src/lib.rs"

[dependencies]
raster_runtime_context = { version = "0.8.1-beta", path = "../../libs/raster_runtime_context" }
raster_runtime_hooking = { version = "0.8.1-beta", path = "../../libs/raster_runtime_hooking" }
raster_runtime_utils = { version = "0.8.1-beta", path = "../../libs/raster_runtime_utils", default-features = false }
once_cell = { version = "1", features = ["std"], default-features = false }
rquickjs = { version = "0.11", git = "https://github.com/DelSkayn/rquickjs", default-features = false }
tokio = { version = "1", features = [
  "macros",
  "sync",
  "time",
], default-features = false }

[dev-dependencies]
raster_runtime_test = { path = "../../libs/raster_runtime_test" }
