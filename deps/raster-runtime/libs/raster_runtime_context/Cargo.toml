[package]
name = "raster_runtime_context"
description = "raster_runtime context helpers"
version = "0.8.1-beta"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/ray-d-song/raster_runtime"

[dependencies]
rquickjs = { version = "0.11", git = "https://github.com/DelSkayn/rquickjs", features = [
    "futures",
], default-features = false }
raster_runtime_utils = { version = "0.8.1-beta", path = "../raster_runtime_utils", default-features = false }
tokio = { version = "1", features = ["sync"], default-features = false }
tracing = { version = "0.1", default-features = false }

[dev-dependencies]
raster_runtime_test = { version = "0.8.1-beta", path = "../raster_runtime_test" }

[build-dependencies]
raster_runtime_build = { version = "0.8.1-beta", path = "../raster_runtime_build" }
